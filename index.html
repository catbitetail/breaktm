            const secs = [{ key: 'am', icon: '☀️', label: '上午', items: plan.am }, { key: 'pm', icon: '🌤️', label: '下午', items: plan.pm }, { key: 'ev', icon: '🌙', label: '晚上', items: plan.ev }];
            let html = '';
            secs.forEach(sec => {
                html += '<div class="time-section"><div class="time-label"><span class="tl-icon">' + sec.icon + '</span>' + sec.label + '</div>';
                sec.items.forEach((item, idx) => {
                    const tk = dayNum + '-' + sec.key + '-' + idx;
                    const ck = state.taskChecks[tk] ? ' checked' : '';
                    html += '<div class="task-check-wrap' + ck + '" style="background:transparent;padding:4px 0"><input type="checkbox" class="task-checkbox"' + (ck ? ' checked' : '') + ' onchange="toggleTaskCheck(\'' + tk + '\');openDayDetail(' + dayNum + ')"><span class="pti-text" style="flex:1">' + linkifyTaskText(item) + '</span></div>';
                });
                html += '</div>';
            });
            if (plan.skills.length > 0) {
                html += '<div class="time-section"><div class="time-label"><span class="tl-icon">🎯</span>关联技能</div>';
                plan.skills.forEach(sid => {
                    const sk = ALL_SKILLS.find(s => s.id === sid);
                    if (sk) {
                        const st = state.skills[sid]?.status || 'none';
                        const stIcon = st === 'mastered' ? '🟩' : st === 'learning' ? '🟨' : st === 'review' ? '🟥' : '⬜';
                        html += '<div class="plan-task-item"><span class="pti-text">' + stIcon + ' ' + sk.name + ' <span style="font-size:9px;color:var(--sub)">' + sk.modName + '</span></span><button class="pti-btn" onclick="event.stopPropagation();closeDayDetail();openSolve(\'' + sid + '\')">' + '▶ 练习</button></div>';
                    }
                });
                html += '</div>';
            }
            document.getElementById('ddContent').innerHTML = html;
            const resDiv = document.getElementById('ddResources');
            if (plan.res && plan.res.length > 0) {
                resDiv.innerHTML = '<div class="ddr-title">📚 学习资源</div>' + plan.res.map(r => '<a class="plan-res-link" href="' + r.u + '" target="_blank">' + r.n + '</a>').join('');
                resDiv.style.display = '';
            } else { resDiv.style.display = 'none'; }
            const btn = document.getElementById('ddCompleteBtn');
            const isDone = state.completedPlanDays.includes(dayNum);
            btn.textContent = isDone ? '✓ 已完成' : '标记为已完成';
            btn.className = 'dd-complete-btn ' + (isDone ? 'done' : 'pending');
            btn.dataset.day = dayNum;
            document.getElementById('dayDetailOverlay').classList.add('open');
        }

        function closeDayDetail() { document.getElementById('dayDetailOverlay').classList.remove('open'); }

        function togglePlanDayComplete() {
            const btn = document.getElementById('ddCompleteBtn');
            const dayNum = parseInt(btn.dataset.day); if (!dayNum) return;
            const idx = state.completedPlanDays.indexOf(dayNum);
            if (idx >= 0) state.completedPlanDays.splice(idx, 1); else state.completedPlanDays.push(dayNum);
            saveState();
            const isDone = state.completedPlanDays.includes(dayNum);
            btn.textContent = isDone ? '✓ 已完成' : '标记为已完成';
            btn.className = 'dd-complete-btn ' + (isDone ? 'done' : 'pending');
            renderPlan(); renderHome();
            showToast(isDone ? '第' + dayNum + '天已标记完成 ✓' : '已取消标记');
        }

        // ═══════════════════════════════════════════════════════════════════
        //  SOLVE PAGE + TIMER
        // ═══════════════════════════════════════════════════════════════════
        let timerState = { sid: null, phase: 1, totalSec: 300, remaining: 300, running: false, interval: null };
        const RING_C = 2 * Math.PI * 85;
        let currentPage = 'Home';
        let solveReturnPage = 'Home';

        function openSolve(skillId) {
            const sk = ALL_SKILLS.find(s => s.id === skillId);
            if (!sk) return;
            // Determine timer mode: algo module gets 2-phase timer, others get free mode
            const isAlgo = sk.modId === 'algo';
            timerState = { sid: skillId, phase: 1, totalSec: isAlgo ? 300 : 0, remaining: isAlgo ? 300 : 0, running: false, interval: null, freeMode: !isAlgo };
            solveReturnPage = currentPage;
            document.getElementById('solveId').textContent = sk.modName + ' · ' + sk.cat;
            document.getElementById('solveName').textContent = sk.name;
            const modProg = getModuleProgress(sk.modId);
            document.getElementById('solveProgFill').style.width = modProg.pct + '%';
            document.getElementById('solveProg').textContent = sk.modName + ' ' + modProg.mastered + '/' + modProg.total;
            // Links - use first problem with a link
            const lcProb = sk.problems.find(p => p.link && p.link.includes('leetcode'));
            const lcLink = document.getElementById('solveLcLink');
            if (lcProb) { lcLink.href = lcProb.link; lcLink.style.display = ''; } else { lcLink.style.display = 'none'; }
            const biliLink = document.getElementById('solveBiliLink');
            biliLink.href = 'https://search.bilibili.com/all?keyword=' + encodeURIComponent(sk.name);
            const refLink = document.getElementById('solveRefLink');
            const refProb = sk.problems.find(p => p.link && !p.link.includes('leetcode'));
            if (refProb) { refLink.href = refProb.link; refLink.style.display = ''; } else { refLink.style.display = 'none'; }
            // Problem checklist
            renderSolveProblems(skillId);
            document.getElementById('solveNote').value = state.skills[skillId]?.notes || '';
            document.getElementById('solveStatus').style.display = 'none';
            // Timer display
            if (timerState.freeMode) {
                document.getElementById('solveStartBtn').textContent = '⬆ 开始计时';
                document.getElementById('ringPhase').textContent = '自由练习模式';
            } else {
                document.getElementById('solveStartBtn').textContent = '开始';
            }
            document.getElementById('solveStartBtn').style.display = '';
            document.getElementById('solveFinishBtn').style.display = '';
            updateRing();
            ['Home', 'Modules', 'Graph', 'Plan', 'Settings'].forEach(pg => { document.getElementById('pg' + pg).style.display = 'none'; });
            document.getElementById('mainNav').style.display = 'none';
            document.getElementById('pgSolve').classList.add('active');
        }

        function closeSolve() {
            clearInterval(timerState.interval); timerState.running = false;
            document.getElementById('pgSolve').classList.remove('active');
            document.getElementById('mainNav').style.display = '';
            switchPage(solveReturnPage);
        }

        function toggleTimer() {
            if (timerState.freeMode) {
                // Free mode: count UP
                if (timerState.running) {
                    clearInterval(timerState.interval); timerState.running = false;
                    document.getElementById('solveStartBtn').textContent = '⬆ 继续';
                } else {
                    timerState.running = true;
                    document.getElementById('solveStartBtn').textContent = '⏸ 暂停';
                    timerState.interval = setInterval(() => { timerState.remaining++; timerState.totalSec++; updateRing(); }, 1000);
                }
            } else {
                if (timerState.running) {
                    clearInterval(timerState.interval); timerState.running = false;
                    document.getElementById('solveStartBtn').textContent = '继续';
                } else {
                    timerState.running = true;
                    document.getElementById('solveStartBtn').textContent = '暂停';
                    timerState.interval = setInterval(tickTimer, 1000);
                }
            }
        }

        function tickTimer() {
            timerState.remaining--;
            updateRing();
            if (timerState.remaining <= 0) { clearInterval(timerState.interval); timerState.running = false; phaseEnd(); }
        }

        function phaseEnd() {
            if (timerState.phase === 1) {
                showAlert('⏰', '思路期结束！', '有思路了吗？\n没有的话，可以看提示和题解！', () => {
                    timerState.phase = 2; timerState.totalSec = 1500; timerState.remaining = 1500;
                    document.getElementById('solveStartBtn').textContent = '开始实操'; document.getElementById('solveStartBtn').style.display = '';
                    updateRing();
                });
            } else {
                showAlert('⏰', '25分钟超时！', '停止死磕，标记状态结算！', () => {
                    document.getElementById('solveStartBtn').style.display = 'none';
                    document.getElementById('solveFinishBtn').style.display = 'none';
                    document.getElementById('solveStatus').style.display = 'block';
                    updateRing();
                });
            }
        }

        function resetTimer() {
            clearInterval(timerState.interval); timerState.running = false;
            if (timerState.freeMode) { timerState.remaining = 0; timerState.totalSec = 0; document.getElementById('solveStartBtn').textContent = '⬆ 开始计时'; }
            else { timerState.remaining = timerState.phase === 1 ? 300 : 1500; document.getElementById('solveStartBtn').textContent = timerState.phase === 1 ? '开始' : '开始实操'; }
            document.getElementById('solveStartBtn').style.display = '';
            document.getElementById('solveFinishBtn').style.display = '';
            document.getElementById('solveStatus').style.display = 'none';
            updateRing();
        }

        function updateRing() {
            const r = timerState.remaining;
            if (timerState.freeMode) {
                const m = String(Math.floor(r / 60)).padStart(2, '0'), s = String(r % 60).padStart(2, '0');
                document.getElementById('ringTime').textContent = m + ':' + s;
                document.getElementById('ringPhase').textContent = '自由练习';
                const fg = document.getElementById('ringFg');
                fg.setAttribute('stroke-dasharray', RING_C);
                fg.setAttribute('stroke-dashoffset', '0');
                fg.className.baseVal = 'ring-fg phase1';
            } else {
                const m = String(Math.floor(r / 60)).padStart(2, '0'), s = String(r % 60).padStart(2, '0');
                document.getElementById('ringTime').textContent = m + ':' + s;
                document.getElementById('ringPhase').textContent = timerState.phase === 1 ? '思路期' : '实操期';
                const fg = document.getElementById('ringFg');
                const pct = timerState.totalSec > 0 ? timerState.remaining / timerState.totalSec : 1;
                fg.setAttribute('stroke-dasharray', RING_C);
                fg.setAttribute('stroke-dashoffset', RING_C * (1 - pct));
                fg.className.baseVal = 'ring-fg ' + (timerState.phase === 1 ? 'phase1' : 'phase2');
                document.getElementById('ringTime').style.color = (r <= 30 && timerState.running) ? 'var(--hard)' : '';
            }
        }

        function markAndClose(status) {
            if (timerState.sid) setSkillStatus(timerState.sid, status, null);
            closeSolve();
        }

        function finishEarly() {
            clearInterval(timerState.interval); timerState.running = false;
            document.getElementById('solveStartBtn').style.display = 'none';
            document.getElementById('solveFinishBtn').style.display = 'none';
            document.getElementById('solveStatus').style.display = 'block';
        }

        function renderSolveProblems(skillId) {
            const sk = ALL_SKILLS.find(s => s.id === skillId);
            if (!sk) return;
            const checks = state.skills[skillId]?.problemChecks || {};
            let html = '<div class="solve-hint-text">' + sk.hint + '</div>';
            if (sk.problems.length > 0) {
                html += '<div class="solve-prob-list">';
                sk.problems.forEach((p, i) => {
                    const ck = checks[i] ? true : false;
                    html += '<div class="solve-prob-item' + (ck ? ' checked' : '') + '">' +
                        '<input type="checkbox" class="solve-prob-check"' + (ck ? ' checked' : '') + ' onchange="toggleSolveProb(\'' + skillId + '\',' + i + ')">' +
                        '<span class="sk-prob-name">' + p.name + '</span>' +
                        '<span class="sk-prob-src">' + p.src + '</span>' +
                        (p.link ? '<a class="sk-prob-link" href="' + p.link + '" target="_blank" onclick="event.stopPropagation()">↗</a>' : '') +
                        '</div>';
                });
                html += '</div>';
            }
            document.getElementById('solveHint').innerHTML = html;
        }

        function updateSolveProgress() {
            if (!timerState.sid) return;
            const sk = ALL_SKILLS.find(s => s.id === timerState.sid);
            if (!sk) return;
            const modProg = getModuleProgress(sk.modId);
            document.getElementById('solveProgFill').style.width = modProg.pct + '%';
            document.getElementById('solveProg').textContent = sk.modName + ' ' + modProg.mastered + '/' + modProg.total;
        }

        function revertSkillStatus(skillId) {
            const st = state.skills[skillId];
            if (!st || !st.status) return;
            const prevStatus = st.status;
            // Revert reward
            const histIdx = state.rewards.history.findIndex(h => h.id === skillId);
            if (histIdx !== -1) {
                const amt = state.rewards.history[histIdx].amt;
                state.rewards.earned = Math.max(0, state.rewards.earned - amt);
                state.rewards.history.splice(histIdx, 1);
                showToast('已回退 -¥' + amt);
            }
            // Clear status but keep notes & problemChecks
            delete st.status;
            delete st.masteredAt;
            delete st.nextReviews;
            saveState(); renderHome(); updateSolveProgress();
        }

        function toggleSolveProb(skillId, probIdx) {
            if (!state.skills[skillId]) state.skills[skillId] = {};
            if (!state.skills[skillId].problemChecks) state.skills[skillId].problemChecks = {};
            const checks = state.skills[skillId].problemChecks;
            if (checks[probIdx]) delete checks[probIdx];
            else checks[probIdx] = true;
            saveState();
            renderSolveProblems(skillId);
            // Auto-status: upgrade AND downgrade based on checkbox state
            const sk = ALL_SKILLS.find(s => s.id === skillId);
            if (!sk) return;
            const totalProbs = sk.problems.length;
            const doneProbs = Object.keys(checks).filter(k => checks[k]).length;
            const currentStatus = state.skills[skillId]?.status || 'none';
            if (doneProbs === 0) {
                // All unchecked: revert status & reward
                if (currentStatus && currentStatus !== 'none') {
                    revertSkillStatus(skillId);
                }
            } else if (doneProbs > 0 && doneProbs < totalProbs) {
                if (currentStatus === 'none' || !currentStatus) {
                    setSkillStatus(skillId, 'learning', null);
                    updateSolveProgress();
                } else if (currentStatus === 'mastered') {
                    // Downgrade mastered -> learning
                    state.skills[skillId].status = 'learning';
                    state.skills[skillId].nextReviews = [];
                    saveState(); renderHome(); updateSolveProgress();
                    showToast('降为学习中');
                }
            } else if (doneProbs === totalProbs && totalProbs > 0 && currentStatus !== 'mastered') {
                setSkillStatus(skillId, 'mastered', null);
                updateSolveProgress();
                showToast('全部完成！技能已掌握 🎉');
            }
        }

        let noteTimer = null;
        function saveNoteDebounced() {
            clearTimeout(noteTimer);
            noteTimer = setTimeout(() => {
                if (!timerState.sid) return;
                if (!state.skills[timerState.sid]) state.skills[timerState.sid] = {};
                state.skills[timerState.sid].notes = document.getElementById('solveNote').value;
                saveState();
            }, 800);
        }

        // ═══════════════════════════════════════════════════════════════════
        //  GRAPH + SETTINGS + UTILITIES
        // ═══════════════════════════════════════════════════════════════════
        // ─── KNOWLEDGE GRAPH ────
        let graphInited = false, graphNodes = [];
        function renderGraph() {
            const canvas = document.getElementById('graphCanvas'); if (!canvas) return;
            const wrap = canvas.parentElement, W = wrap.clientWidth, H = Math.max(400, W * 0.75);
            canvas.width = W * 2; canvas.height = H * 2; canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
            const ctx = canvas.getContext('2d'); ctx.scale(2, 2); ctx.clearRect(0, 0, W, H);
            const cx = W / 2, cy = H / 2, catR = Math.min(W, H) * 0.3;
            const colorMap = { algo: '#7C9AE0', ml: '#E0A07C', sim: '#7CE0B8', data: '#D07CE0' };
            const nodes = graphNodes = [];
            MODULES.forEach((mod, mi) => {
                const angle = (mi / MODULES.length) * Math.PI * 2 - Math.PI / 2;
                const mx = cx + Math.cos(angle) * catR, my = cy + Math.sin(angle) * catR;
                nodes.push({ x: mx, y: my, r: 22, cat: true, label: mod.name, color: colorMap[mod.id] });
                mod.skills.forEach((s, si) => {
                    const subAngle = angle + ((si - mod.skills.length / 2) * 0.3);
                    const subR = 50 + si * 10;
                    const sx = mx + Math.cos(subAngle) * subR, sy = my + Math.sin(subAngle) * subR;
                    const st = state.skills[s.id]?.status;
                    const sColor = st === 'mastered' ? '#51cf66' : st === 'learning' ? '#fcc419' : st === 'review' ? '#ff6b6b' : 'rgba(180,180,200,0.5)';
                    nodes.push({ x: sx, y: sy, r: 6, color: sColor, sid: s.id, label: s.name });
                    ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(sx, sy); ctx.strokeStyle = 'rgba(180,180,200,0.12)'; ctx.lineWidth = 0.8; ctx.stroke();
                });
            });
            nodes.forEach(n => {
                ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                if (n.cat) { ctx.fillStyle = n.color; ctx.fill(); ctx.fillStyle = '#fff'; ctx.font = 'bold 9px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(n.label, n.x, n.y); }
                else { ctx.fillStyle = n.color; ctx.fill(); }
            });
            if (!graphInited) {
                graphInited = true;
                const tooltip = document.getElementById('graphTooltip');
                canvas.addEventListener('mousemove', e => {
                    const rect = canvas.getBoundingClientRect(), mx = e.clientX - rect.left, my = e.clientY - rect.top;
                    let found = null;
                    for (let i = graphNodes.length - 1; i >= 0; i--) { const n = graphNodes[i]; if (Math.hypot(mx - n.x, my - n.y) < n.r + 4) { found = n; break; } }
                    if (found) { tooltip.textContent = found.label; tooltip.style.display = 'block'; tooltip.style.left = found.x + 'px'; tooltip.style.top = (found.y - 20) + 'px'; canvas.style.cursor = found.sid ? 'pointer' : 'default'; }
                    else { tooltip.style.display = 'none'; canvas.style.cursor = 'default'; }
                });
                canvas.addEventListener('click', e => {
                    const rect = canvas.getBoundingClientRect(), mx = e.clientX - rect.left, my = e.clientY - rect.top;
                    for (let i = graphNodes.length - 1; i >= 0; i--) { const n = graphNodes[i]; if (n.sid && Math.hypot(mx - n.x, my - n.y) < n.r + 4) { openSolve(n.sid); return; } }
                });
            }
        }

        // ─── SETTINGS ────
        function renderSettings() {
            document.getElementById('setSchool').value = state.settings.targetSchool || '智科';
            document.getElementById('setStartDate').value = state.settings.startDate || todayStr();
            document.getElementById('setDays').value = state.settings.totalDays || 120;
            document.getElementById('setP1').value = state.settings.p1 || 50;
            document.getElementById('setP2').value = state.settings.p2 || 87;
            // Reward
            const bal = state.rewards.earned - state.rewards.spent;
            document.getElementById('rewardTotal').textContent = '¥' + bal;
            const rd = document.getElementById('rewardDetail');
            if (state.rewards.history && state.rewards.history.length > 0) {
                rd.innerHTML = state.rewards.history.slice(0, 8).map(h => {
                    const icon = h.status === 'mastered' ? '🟩' : h.status === 'learning' ? '🟨' : '🟥';
                    const dt = new Date(h.date); return '<div style="display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 0"><span>' + icon + '</span><span style="flex:1">' + h.name + '</span><span style="color:var(--easy)">+¥' + h.amt + '</span><span style="color:var(--muted)">' + (dt.getMonth() + 1) + '/' + dt.getDate() + '</span></div>';
                }).join('');
            } else { rd.innerHTML = '<div style="text-align:center;font-size:11px;color:var(--muted);padding:8px 0">练习第一个技能就有记录了～</div>'; }
            // Cloud
            document.getElementById('setApiUrl').value = cloudConfig.apiUrl || '';
            document.getElementById('setApiToken').value = cloudConfig.token || '';
            if (cloudConfig.apiUrl && cloudConfig.token) updateCloudStatus('ok', '已配置');
            else updateCloudStatus('err', '未配置');
        }

        function saveSettings() {
            state.settings.targetSchool = document.getElementById('setSchool').value;
            state.settings.startDate = document.getElementById('setStartDate').value || todayStr();
            state.settings.totalDays = parseInt(document.getElementById('setDays').value) || 120;
            state.settings.p1 = parseInt(document.getElementById('setP1').value) || 50;
            state.settings.p2 = parseInt(document.getElementById('setP2').value) || 87;
            saveState(); renderHome(); showToast('设置已保存 ✓');
        }

        function saveCloudConfig() {
            cloudConfig.apiUrl = (document.getElementById('setApiUrl').value || '').trim();
            cloudConfig.token = (document.getElementById('setApiToken').value || '').trim();
            localStorage.setItem('nju_cloud_config', JSON.stringify(cloudConfig));
            if (cloudConfig.apiUrl && cloudConfig.token) { updateCloudStatus('ok', '配置已保存'); syncToCloud().then(() => showToast('云端配置已保存 ✓')); }
            else { updateCloudStatus('err', '未配置'); showToast('云端配置已清除'); }
        }

        function syncToCloudBtn() { syncToCloud().then(() => showToast('已推送到云端 ✓')); }

        // ─── ALERT + TOAST ────
        let alertCallback = null;
        function showAlert(icon, title, msg, onClose) {
            document.getElementById('alertIcon').textContent = icon;
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMsg').innerHTML = msg.replace(/\n/g, '<br>');
            alertCallback = onClose || null;
            document.getElementById('alertOverlay').classList.add('open');
        }
        function closeAlert() {
            document.getElementById('alertOverlay').classList.remove('open');
            if (alertCallback) { alertCallback(); alertCallback = null; }
        }

        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
            clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ─── PAGE SWITCH ────
        function switchPage(name, btn) {
            document.getElementById('pgSolve').classList.remove('active');
            document.getElementById('mainNav').style.display = '';
            ['Home', 'Modules', 'Graph', 'Plan', 'Settings'].forEach(p => {
                document.getElementById('pg' + p).style.display = p === name ? 'block' : 'none';
            });
            if (btn) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            currentPage = name;
            if (name === 'Home') renderHome();
            if (name === 'Modules') renderModules();
            if (name === 'Graph') renderGraph();
            if (name === 'Plan') renderPlan();
            if (name === 'Settings') renderSettings();
        }

        function renderAll() { renderHome(); renderModules(); renderSettings(); }

        // ─── INIT ────
        loadState();
        renderHome();
        renderModules();
        renderSettings();
        if (cloudConfig.apiUrl && cloudConfig.token) syncFromCloud(true);

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }

    </script>
